<!doctype html>
<html>
<head><meta charset="utf-8"><title>Product matcher — demo</title></head>
<body>
  <h1>Product matcher — demo</h1>
  <input id="sku" placeholder="Введите артикул/sku">
  <button onclick="doLookup()">Поиск</button>
  <pre id="out"></pre>
<script>
async function doLookup(){
  const sku = document.getElementById('sku').value;
  const res = await fetch('/api/lookup?sku='+encodeURIComponent(sku));
  const data = await res.json();
  document.getElementById('out').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
