version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: pm_pass
      POSTGRES_DB: product_matcher
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://pm:pm_pass@db:5432/product_matcher

    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:
